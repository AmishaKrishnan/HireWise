<!DOCTYPE html>
<html>
<head>
    <title>Add Interview Question</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f4f7fc;
        }

        .header{
            background:linear-gradient(135deg,#0d6efd,#4f46e5);
            color:white;
            padding:30px;
            border-radius:15px;
        }

        .card{
            border:none;
            border-radius:15px;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <!-- Header -->

    <div class="header shadow">

        <h2>
            <i class="bi bi-chat-square-text-fill"></i>
            Add Interview Question
        </h2>

        <p class="mb-0">
            Add technical and HR interview questions to the question bank.
        </p>

    </div>

    <!-- Form -->

    <div class="card shadow mt-4">

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Category
                    </label>

                    <select name="category"
                            class="form-select">

                        <option>Python</option>
                        <option>Java</option>
                        <option>DBMS</option>
                        <option>OS</option>
                        <option>HR</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Question
                    </label>

                    <textarea
                        name="question"
                        class="form-control"
                        rows="4"
                        required></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Answer
                    </label>

                    <textarea
                        name="answer"
                        class="form-control"
                        rows="5"
                        required></textarea>

                </div>

                <button class="btn btn-success">

                    <i class="bi bi-save-fill"></i>
                    Save Question

                </button>

                <a href="/admin_dashboard"
                   class="btn btn-primary">

                    <i class="bi bi-arrow-left"></i>
                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
