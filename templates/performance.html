<!DOCTYPE html>
<html>
<head>

    <title>Performance Tracker | HireWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body style="background:#f4f7fc;">

<div class="container py-5">

    <!-- Header -->

    <div class="card shadow border-0 mb-4">

        <div class="card-body text-center p-5">

            <i class="bi bi-graph-up-arrow text-info"
               style="font-size:70px;"></i>

            <h1 class="mt-3">
                Performance Tracker
            </h1>

            <p class="text-muted">
                Monitor your learning progress and test performance.
            </p>

        </div>

    </div>

    <!-- Summary Cards -->

    <div class="row g-4 mb-4">

        <div class="col-md-4">

            <div class="card shadow border-0">

                <div class="card-body text-center">

                    <i class="bi bi-file-earmark-person-fill text-primary fs-1"></i>

                    <h5 class="mt-3">
                        Resume Score
                    </h5>

                    <h2>
                        {% if scores %}
                            {{ resume_score }}
                        {% else %}
                            0
                        {% endif %}
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow border-0">

                <div class="card-body text-center">

                    <i class="bi bi-journal-check text-success fs-1"></i>

                    <h5 class="mt-3">
                        Tests Taken
                    </h5>

                    <h2>
                        {{ tests_taken }}
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow border-0">

                <div class="card-body text-center">

                    <i class="bi bi-trophy-fill text-warning fs-1"></i>

                    <h5 class="mt-3">
                        Best Score
                    </h5>

                    <h2>
                        {{ best_aptitude }}
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <!-- Chart -->

    <div class="card shadow border-0">

        <div class="card-body p-4">

            <h4 class="mb-4">
                Performance Chart
            </h4>

            <canvas id="scoreChart"></canvas>

        </div>

    </div>

    <!-- Back Button -->

    <div class="text-center mt-4">

        <a href="/dashboard"
           class="btn btn-outline-primary">

            <i class="bi bi-arrow-left"></i>

            Back to Dashboard

        </a>

    </div>

</div>

<script>

const ctx = document.getElementById('scoreChart');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: {{ labels | safe }},

        datasets: [{

            label: 'Scores',

            data: {{ scores | safe }},

            backgroundColor: [
                '#0d6efd',
                '#198754',
                '#ffc107',
                '#0dcaf0',
                '#dc3545'
            ]

        }]
    },

    options: {

        responsive: true,

        plugins: {

            legend: {
                display: false
            }

        },

        scales: {

            y: {
                beginAtZero: true,
                max: 100
            }

        }

    }

});

</script>

</body>
</html>
