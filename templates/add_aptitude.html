<!DOCTYPE html>
<html>
<head>
    <title>Add Aptitude Question</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f4f7fc;
        }

        .header{
            background:linear-gradient(135deg,#0d6efd,#4f46e5);
            color:white;
            padding:30px;
            border-radius:15px;
        }

        .card{
            border:none;
            border-radius:15px;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <!-- Header -->

    <div class="header shadow">

        <h2>
            <i class="bi bi-journal-check"></i>
            Add Aptitude Question
        </h2>

        <p class="mb-0">
            Manage and expand the aptitude question database.
        </p>

    </div>

    <!-- Form -->

    <div class="card shadow mt-4">

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Question
                    </label>

                    <input
                        type="text"
                        name="question"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Option A
                    </label>

                    <input
                        type="text"
                        name="a"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Option B
                    </label>

                    <input
                        type="text"
                        name="b"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Option C
                    </label>

                    <input
                        type="text"
                        name="c"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Option D
                    </label>

                    <input
                        type="text"
                        name="d"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Correct Answer
                    </label>

                    <select
                        name="correct"
                        class="form-select">

                        <option>A</option>
                        <option>B</option>
                        <option>C</option>
                        <option>D</option>

                    </select>

                </div>

                <button class="btn btn-success">

                    <i class="bi bi-save-fill"></i>
                    Save Question

                </button>

                <a href="/admin_dashboard"
                   class="btn btn-primary">

                    <i class="bi bi-arrow-left"></i>
                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
